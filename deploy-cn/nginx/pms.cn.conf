server {
    listen 80;
    server_name bjgoodwill.fun api.bjgoodwill.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bjgoodwill.fun;

    ssl_certificate     /etc/nginx/ssl/bjgoodwill.fun.pem;
    ssl_certificate_key /etc/nginx/ssl/bjgoodwill.fun.key;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /opt/pms/www;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

